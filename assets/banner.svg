<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="fastapi-trusted-devices — Trusted-device and session security for FastAPI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06241f"/>
      <stop offset="0.5" stop-color="#0a544a"/>
      <stop offset="1" stop-color="#009688"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <style>
      .t { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="300" rx="24" fill="url(#bg)"/>

  <!-- shield + check motif -->
  <g transform="translate(96 70)">
    <path d="M80 0 L156 30 V92 C156 138 122 168 80 184 C38 168 4 138 4 92 V30 Z"
          fill="#ffffff" opacity="0.10"/>
    <path d="M80 0 L156 30 V92 C156 138 122 168 80 184 C38 168 4 138 4 92 V30 Z"
          fill="none" stroke="url(#accent)" stroke-width="3"/>
    <path d="M48 92 L72 116 L116 64" fill="none" stroke="url(#accent)" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text class="t" x="306" y="132" font-size="62" font-weight="800" fill="#ffffff">fastapi-trusted-devices</text>
  <text class="t" x="308" y="178" font-size="27" font-weight="500" fill="#bdf3ea">Trusted-device &amp; session security for FastAPI</text>

  <!-- feature chips -->
  <g class="t" font-size="20" font-weight="600" fill="#ffffff">
    <g transform="translate(308 206)">
      <rect width="174" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="87" y="26" text-anchor="middle">device registry</text>
    </g>
    <g transform="translate(494 206)">
      <rect width="150" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="75" y="26" text-anchor="middle">revoke / list</text>
    </g>
    <g transform="translate(656 206)">
      <rect width="166" height="40" rx="20" fill="#ffffff" opacity="0.12"/>
      <text x="83" y="26" text-anchor="middle">auth-agnostic</text>
    </g>
  </g>

  <text class="t" x="1108" y="266" text-anchor="end" font-size="17" font-weight="600" fill="#7fe3d4" opacity="0.85">Python 3.10+ · async SQLAlchemy 2.0</text>
</svg>
