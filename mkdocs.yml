site_name: FastAPI Trusted Devices
site_description: Trusted-device management and session security for FastAPI.
site_url: https://javlondevv.github.io/fastapi-trusted-devices/
repo_url: https://github.com/javlondevv/fastapi-trusted-devices
repo_name: javlondevv/fastapi-trusted-devices
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - API Reference: api.md
  - Storage & Repository: repository.md
  - Events: events.md
  - Exceptions: exceptions.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md
  - License: license.md

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/javlondevv
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fastapi-trusted-devices/
    - icon: fontawesome/brands/telegram
      link: https://t.me/DevFlowJavlon
